syntax = "proto3";

option go_package = "github.com/avalanche-pwn/cdrepo/daemon_pb";
option java_multiple_files = true;
option java_package = "com.github.avalanche-pwn.cdrepo";
option java_outer_classname = "Daemon";

package helloworld;

service Daemon {
  rpc Register (RegisterRequest) returns (RegisterResponse) {}
}

message RegisterRequest {
    string path = 1;
}

message RegisterResponse {
    bool success = 1;
}
